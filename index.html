<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IP Address Tracker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <!-- Header -->
    <div id="header">
        <h1>IP Address Tracker</h1>

        <!-- Search bar -->
        <div id="search-form" role="search">
            <label for="ip-input" class="visually-hidden">Search for any IP address or domain</label>
            <input type="text" id="ip-input" placeholder="Search for any IP address or domain"
                aria-describedby="error-msg" />
            <button id="search-btn" onclick="handleSearch()" aria-label="Search">&#8594;</button>
        </div>

        <!-- Error message for failed call -->
        <p id="error-msg" role="alert">Invalid IP address or domain. Please try again.</p>

        <!-- Info card + blocks -->
        <div id="info-card" role="region" aria-live="polite" aria-label="IP Results">
            <div class="info-block">
                <p class="label">IP Address</p>
                <p class="value" id="display-ip">—</p>
            </div>
            <div class="info-block">
                <p class="label">Location</p>
                <p class="value" id="display-location">—</p>
            </div>
            <div class="info-block">
                <p class="label">Timezone</p>
                <p class="value" id="display-timezone">—</p>
            </div>
            <div class="info-block">
                <p class="label">ISP</p>
                <p class="value" id="display-isp">—</p>
            </div>
        </div>
    </div>

    <!-- Set up Leaflet map -->
    <div id="map" role="application" aria-label="IP location map"></div>

</body>

</html>
